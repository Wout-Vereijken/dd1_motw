name: MOTW Checker
on:
  schedule:
    - cron: '0 12 * * 3'  
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4
      - run: python motw_checker.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
